<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Perf Lab — Bibliothèque d'entraînement</title>
<meta name="description" content="Bibliothèque d'entraînement synchronisée : programmes, animations, timer et suivi de charge, hors-ligne.">

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0d10">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Perf Lab">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app"></div>

<div class="dock" style="display:none">
  <div class="dock-in">
    <div class="clock" id="clock">00:00</div>
    <div class="dock-c">
      <button class="dbtn" data-t="60">EVERY 1′</button>
      <button class="dbtn" data-t="90">EVERY 1′30</button>
      <button class="dbtn" data-t="120">EVERY 2′</button>
      <button class="dbtn" data-emom="12">EMOM 12′</button>
      <button class="dbtn go" id="tstart">▶</button>
      <button class="dbtn" id="tstop">■</button>
    </div>
    <div class="dmode" id="dmode">PRÊT</div>
  </div>
</div>

<!-- ordre important : config → programmes par défaut → client supabase → backend → moteur -->
<script src="config.js"></script>
<script src="programs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="backend.js"></script>
<script src="app.js"></script>
</body>
</html>
